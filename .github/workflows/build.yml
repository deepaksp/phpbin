name: CI

on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env: 
  API: 24 
  TARGET: aarch64-linux-android

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
    
      - name: Pull Termux Docker image
        run: docker pull ghcr.io/termux/termux-docker:latest
    
      - name: Start container
        run: |
          docker run -d --name termux phpbuild ghcr.io/termux/termux-docker:latest sleep infinity
    
      - name: Install build dependencies
        run: |
          docker exec termux pkg update -y
          docker exec termux pkg install -y \
            git \
            clang \
            make \
            autoconf \
            bison \
            re2c \
            libxml2 \
            libxml2-dev \
            openssl \
            openssl-dev
    
      - name: Clone PHP source
        run: |
          docker exec termux git clone https://github.com/php/php-src.git
          docker exec termux bash -c "cd php-src && git checkout PHP-8.3"
    
      - name: Build PHP
        run: |
          docker exec termux bash -c "
          cd php-src &&
          ./buildconf --force &&
          ./configure --enable-embed --disable-cgi &&
          make -j$(nproc)
          "
    
      - name: Copy build artifacts
        run: |
          docker cp termux:/data/data/com.termux/files/home/php-src/libs ./artifacts
    
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: php-android
          path: artifacts
