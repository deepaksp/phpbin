name: CI

on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env: 
  API: 24 
  TARGET: aarch64-linux-android

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            curl \
            wget \
            clang \
            make \
            autoconf \
            bison \
            re2c \
            build-essential \
            libtool \
            pkg-config \
            docker.io
    
      - name: Clone Termux packages repo
        run: |
          git clone https://github.com/termux/termux-packages.git
    
      - name: Enable PHP embed SAPI
        run: |
          cd termux-packages/packages/php
    
          # Add embed support to configure flags
          sed -i 's/TERMUX_PKG_EXTRA_CONFIGURE_ARGS="/TERMUX_PKG_EXTRA_CONFIGURE_ARGS="--enable-embed /' build.sh
    
      - name: Build PHP using Termux build system
        run: |
          cd termux-packages
          ./scripts/run-docker.sh ./build-package.sh php
    
      - name: Collect artifacts
        run: |
          mkdir artifacts
    
          # Embedded PHP library
          find termux-packages -name "libphp*.so" -exec cp {} artifacts/ \;
    
          # Embed headers
          find termux-packages -name "php_embed.h" -exec cp {} artifacts/ \;
    
      - name: Show artifacts
        run: |
          ls -R artifacts
    
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-android-embed
          path: artifacts
