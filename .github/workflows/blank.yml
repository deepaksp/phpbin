name: Build PHP for Android

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

env:
  NDK_VERSION: r27
  TARGET: aarch64-linux-android
  API: 24

steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Install build dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y autoconf bison re2c libxml2-dev pkg-config build-essential curl unzip git

  - name: Clone PHP source
    run: |
      git clone https://github.com/php/php-src.git
      cd php-src
      git checkout PHP-8.3

  - name: Download Android NDK
    run: |
      wget https://dl.google.com/android/repository/android-ndk-r27-linux.zip
      unzip android-ndk-r27-linux.zip
      echo "NDK=$PWD/android-ndk-r27" >> $GITHUB_ENV
      echo "TOOLCHAIN=$PWD/android-ndk-r27/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV

  - name: Configure PHP
    run: |
      cd php-src
      export CC=$TOOLCHAIN/bin/${TARGET}${API}-clang
      export CXX=$TOOLCHAIN/bin/${TARGET}${API}-clang++
      ./buildconf --force
      ./configure --host=$TARGET --enable-embed --disable-all --enable-json

  - name: Build PHP
    run: |
      cd php-src
      make -j$(nproc)

  - name: Upload libphp.so
    uses: actions/upload-artifact@v4
    with:
      name: libphp-android
      path: php-src/libs/libphp.so
